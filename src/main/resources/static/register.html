<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: radial-gradient(circle at center, #0f3d2e, #081c15);
}

/* 🔥 MAIN BOX */
.container {
    display: flex;
    width: 850px;
    height: 420px;

    background: rgba(255,255,255,0.08);
    border-radius: 15px;

    backdrop-filter: blur(15px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);

    overflow: hidden;
}

/* LEFT SIDE */
.left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #014610, #01575a);
}

/* RIGHT SIDE */
.right {
    width: 50%;
    padding: 40px;
    color: white;
}

/* TITLE */
h2 {
    margin-bottom: 20px;
}

/* INPUT */
.input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    background: #033e52;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #014524;
}

/* LINK */
a {
    display: block;
    margin-top: 10px;
    color: #ccc;
    font-size: 14px;
    text-decoration: none;
}

a:hover {
    color: white;
}
</style>
</head>

<body>

<div class="container">

    <!-- 🔥 LEFT ANIMATION -->
    <div class="left">

        <lottie-player 
            src="https://assets10.lottiefiles.com/packages/lf20_kyu7xb1v.json"
            background="transparent"
            speed="1"
            style="width: 260px; height: 260px;"
            loop autoplay>
        </lottie-player>

    </div>

    <!-- 🔥 RIGHT FORM -->
    <div class="right">

        <h2>Register Now</h2>

        <input class="input" id="username" placeholder="Enter username">
        <input class="input" id="phone" placeholder="Enter phone">
        <input class="input" id="password" type="password" placeholder="Enter password">

        <button onclick="register()">Register</button>

        <a href="login.html">Already have account? Login</a>

    </div>

</div>

<script>
function register() {

    let username = document.getElementById("username").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;

    fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, phone, password})
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);

        if (msg.includes("success")) {
            window.location.href = "login.html";
        }
    });
}
</script>

</body>
</html>
